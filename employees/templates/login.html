{% load static %}

<!DOCTYPE html>
<html>
<head>

<title>Employee MS Login</title>
<link rel="icon" type="image/png" href="{% static 'images/employee-ms-logo.png' %}">

<meta charset="utf-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1">

<link
href="{% static 'tabler/css/tabler.min.css' %}"
rel="stylesheet">

<link href="{% static 'css/responsive.css' %}" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Inter;
}

body{

min-height:100vh;

display:flex;

justify-content:center;

align-items:center;

background:
radial-gradient(
circle at top left,
rgba(37,99,235,.35),
transparent 30%
),

radial-gradient(
circle at bottom right,
rgba(59,130,246,.25),
transparent 35%
),

linear-gradient(
135deg,
#020617,
#04143a,
#020617
);

overflow-x:hidden;
overflow-y:auto;

}

.login-box{

width:1200px;

max-width:92%;

display:grid;

grid-template-columns:1.2fr .9fr;

background:
rgba(10,18,40,.82);

backdrop-filter:
blur(25px);

border:

1px solid
rgba(
255,
255,
255,
.08
);

border-radius:32px;

overflow:hidden;

box-shadow:

0 30px 100px
rgba(
0,
0,
0,
.55
);

}

.left{

padding:clamp(36px, 5vw, 90px);

display:flex;

flex-direction:column;

justify-content:center;

color:white;

}

.badge{

width:280px;

padding:14px;

border-radius:50px;

background:

linear-gradient(
90deg,
#2563eb,
#3b82f6
);

text-align:center;

margin-bottom:45px;

font-weight:700;

}

.left h1{

font-size:clamp(42px, 5.5vw, 72px);

line-height:1.06;

}

.left p{

color:#94a3b8;

font-size:clamp(18px, 1.8vw, 24px);

line-height:1.65;

}

.right{

padding:clamp(28px, 5vw, 90px);

background:

rgba(
2,
8,
23,
.6
);

display:flex;

align-items:center;

justify-content:center;

}

.form-area{

width:100%;

max-width:420px;

}
.logo{
font-size:58px;
font-weight:800;

color:white;

text-align:center;

margin-bottom:20px;

text-shadow:
0 0 35px
rgba(59,130,246,.5);
}

.subtitle{

text-align:center;

color:#64748b;

margin-bottom:45px;

}

.input{

margin-bottom:26px;

}

input{

width:100%;

height:64px;

padding-left:24px;

border-radius:18px;

border:

1px solid
#22304a;

background:

rgba(
17,
24,
39,
.95
);

color:white;

font-size:18px;

outline:none;

transition:.35s;

}

input:focus{

border-color:#2563eb;

transform:
translateY(-2px);

box-shadow:

0 0 35px
rgba(
37,
99,
235,
.45
);

}

button{

width:100%;

height:64px;

border:none;

border-radius:18px;

font-size:20px;

font-weight:700;

cursor:pointer;

background:

linear-gradient(
135deg,
#2563eb,
#4f8dfc
);

color:white;

transition:.35s;

}

button:hover{

transform:

translateY(-4px);

box-shadow:

0 15px 45px
rgba(
37,
99,
235,
.45
);

}

.footer{

margin-top:30px;

text-align:center;

color:#7b8aa5;

background:none;

border:none;

padding:0;

}
@media(max-width:900px){

.login-box{

grid-template-columns:1fr;

}

.left{

display:none;

}

.login-brand-mark{
width:min(280px, 82vw);
height:auto;
object-fit:contain;
display:block;
margin:0 auto 8px;
filter:drop-shadow(0 12px 24px rgba(4,18,45,.35));
}

.login-brand-name{
font-size:34px;
font-weight:800;
letter-spacing:-.03em;
}

.login-brand-name span{
color:#d6a62c;
}

.login-box{
max-width:calc(100% - 24px);
border-radius:22px;
}

.right{
min-height:auto;
}

input,
button{
height:56px;
font-size:16px;
border-radius:14px;
}

.logo{
font-size:36px;
}

.subtitle{
margin-bottom:28px;
}

}

</style>

</head>

<body>

<div class="login-box">

<div class="left">

<div class="badge">

Premium Workforce CRM

</div>

<h1>

Manage<br>
Workforce<br>
Beautifully

</h1>

<p>

Employee management,
analytics,
attendance,
performance
and reporting
inside one premium dashboard.

</p>

</div>


<div class="right">

<div class="form-area">

<div class="logo">
<img class="login-brand-mark" src="{% static 'images/employee-ms-full-logo.png' %}" alt="Employee Management System">
</div>

<div class="subtitle">

Enterprise HR Portal

</div>

<form method="POST">

{% csrf_token %}

<div class="input">

<input
type="text"
name="username"
placeholder="Username">

</div>

<div class="input">

<input
type="password"
name="password"
placeholder="Password">

</div>

<button>

Login

</button>

</form>

<div class="footer">

Secure Login • CRM v1.0

</div>

</div>

</div>

</div>

</body>

</html>
