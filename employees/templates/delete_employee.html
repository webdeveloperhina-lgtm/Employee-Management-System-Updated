{% load static %}

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Delete Employee</title>
    <link href="{% static 'tabler/css/tabler.min.css' %}" rel="stylesheet">
    <link href="{% static 'css/responsive.css' %}" rel="stylesheet">
    <style>
        body {
            min-height: 100vh;
            background:
                radial-gradient(circle at 18% 12%, rgba(214, 57, 57, 0.22), transparent 30%),
                radial-gradient(circle at 82% 18%, rgba(32, 107, 196, 0.18), transparent 28%),
                #0f172a;
        }

        .confirm-card {
            background: rgba(17, 24, 39, 0.95);
            border: 1px solid rgba(255, 255, 255, 0.09);
            box-shadow: 0 24px 70px rgba(0, 0, 0, 0.38);
        }

        .danger-mark {
            display: grid;
            width: 64px;
            height: 64px;
            place-items: center;
            border-radius: 20px;
            background: linear-gradient(135deg, #d63939, #ff6b81);
            color: #fff;
            font-size: 28px;
            font-weight: 800;
        }

        .employee-pill {
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 10px;
            background: rgba(255, 255, 255, 0.04);
            padding: 14px;
        }
    </style>
</head>
<body data-bs-theme="dark">
    <div class="page">
        {% include 'sidebar.html' %}
        <div class="page-wrapper">
            <div class="page page-center">
                <div class="container container-tight py-4">
            <div class="card confirm-card">
                <div class="card-body p-4 text-center">
                    <div class="danger-mark mx-auto mb-3">!</div>
                    <h1 class="text-white mb-2">Delete Employee?</h1>
                    <p class="text-secondary mb-4">
                        This action will permanently remove this employee from your system.
                    </p>

                    <div class="employee-pill mb-4 text-start">
                        <div class="fw-bold">{{ employee.name }}</div>
                        <div class="text-secondary">{{ employee.email }}</div>
                        <div class="text-secondary">{{ employee.department }}</div>
                    </div>

                    <form method="POST">
                        {% csrf_token %}
                        <div class="d-flex gap-2">
                            <a href="{% url 'home' %}" class="btn btn-outline-secondary w-50">
                                Cancel
                            </a>
                            <button type="submit" class="btn btn-danger w-50">
                                Yes, Delete
                            </button>
                        </div>
                    </form>
                </div>
            </div>
                </div>
            </div>
        </div>
    </div>

    <script src="{% static 'tabler/js/tabler.min.js' %}"></script>
</body>
</html>
