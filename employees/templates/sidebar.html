<script>
(() => {
    const storageKey = "ems-sidebar-collapsed";
    const root = document.documentElement;
    const toggle = document.getElementById("sidebar-collapse-toggle");

    if (localStorage.getItem(storageKey) === "true") {
        root.classList.add("sidebar-collapsed");
    }

    if (!toggle) return;

    const syncToggle = () => {
        const isCollapsed = root.classList.contains("sidebar-collapsed");
        toggle.setAttribute("aria-label", isCollapsed ? "Expand sidebar" : "Collapse sidebar");
        toggle.setAttribute("title", isCollapsed ? "Expand sidebar" : "Collapse sidebar");
    };

    toggle.addEventListener("click", () => {
        root.classList.toggle("sidebar-collapsed");
        localStorage.setItem(storageKey, root.classList.contains("sidebar-collapsed"));
        syncToggle();
    });

    syncToggle();
})();
</script>
